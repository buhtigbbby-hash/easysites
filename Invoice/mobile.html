<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>統一發票兌獎小助手 (手機版)</title>
    <meta name="description" content="極速掃描電子發票 QR Code 並自動對獎，專為手機原生體驗打造。">
    <link rel="stylesheet" href="mobile.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
    <div class="app-wrapper">
        <!-- 頂部標頭 -->
        <header class="top-bar">
            <div class="logo-title">發票兌獎助手</div>
            <select id="period-select" class="period-select-mobile">
                <option value="11411">114年 11-12月</option>
                <option value="11409">114年 09-10月</option>
                <option value="11407">114年 07-08月</option>
            </select>
        </header>

        <!-- 主要內容區 (分頁) -->
        <main class="main-content">
            
            <!-- 分頁 1: 掃描相機 -->
            <section id="view-scanner" class="tab-view active">
                <div class="scanner-status">
                    <h2>掃描對準區</h2>
                    <span id="camera-status" class="status-badge">相機未啟動</span>
                </div>
                <div id="reader-container" class="reader-container">
                    <div id="reader"></div>
                    <div class="scanner-overlay"><div class="scan-line"></div></div>
                </div>
                <p class="scan-hint">請將發票左側的 QR Code 對準畫面</p>
                <div class="cam-controls">
                    <button id="start-btn" class="btn primary-btn">啟動相機</button>
                    <button id="stop-btn" class="btn secondary-btn" style="display: none;">暫停掃描</button>
                </div>
            </section>

            <!-- 分頁 2: 虛擬鍵盤手排輸入 -->
            <section id="view-keypad" class="tab-view">
                <div class="keypad-header">
                    <h2>手動輸入兌獎</h2>
                    <p class="hint">輸入發票末 3 碼快速篩選</p>
                </div>
                <div class="virtual-keypad">
                    <div class="display-box">
                        <span id="digit-0" class="digit-box active"></span>
                        <span id="digit-1" class="digit-box"></span>
                        <span id="digit-2" class="digit-box"></span>
                    </div>
                    <div class="keypad-grid" id="keypad">
                        <button class="key-btn" data-key="1">1</button>
                        <button class="key-btn" data-key="2">2</button>
                        <button class="key-btn" data-key="3">3</button>
                        <button class="key-btn" data-key="4">4</button>
                        <button class="key-btn" data-key="5">5</button>
                        <button class="key-btn" data-key="6">6</button>
                        <button class="key-btn" data-key="7">7</button>
                        <button class="key-btn" data-key="8">8</button>
                        <button class="key-btn" data-key="9">9</button>
                        <button class="key-btn action-key" data-key="clear">清空</button>
                        <button class="key-btn" data-key="0">0</button>
                        <button class="key-btn action-key" data-key="backspace">⌫</button>
                    </div>
                </div>
            </section>

            <!-- 分頁 3: 號碼清單 -->
            <section id="view-info" class="tab-view">
                <div class="info-card">
                    <div class="info-header">
                        <h2>當期中獎號碼</h2>
                        <a id="mof-link" href="https://invoice.etax.nat.gov.tw/" target="_blank" class="mof-link">財政部官網 ↗</a>
                    </div>
                    <div class="numbers-display">
                        <div class="number-row"><span class="prize-tag super-tag">特別獎</span><span class="num-val" id="info-super">-</span></div>
                        <div class="number-row"><span class="prize-tag special-tag">特獎</span><span class="num-val" id="info-special">-</span></div>
                        <div class="number-row"><span class="prize-tag first-tag">頭獎</span><span class="num-val" id="info-first">-</span></div>
                        <div class="number-row"><span class="prize-tag other-tag">二獎</span><span class="num-val text-sm">與頭獎末 7 碼相同</span></div>
                        <div class="number-row"><span class="prize-tag other-tag">三獎</span><span class="num-val text-sm">與頭獎末 6 碼相同</span></div>
                        <div class="number-row"><span class="prize-tag other-tag">四獎</span><span class="num-val text-sm">與頭獎末 5 碼相同</span></div>
                        <div class="number-row"><span class="prize-tag other-tag">五獎</span><span class="num-val text-sm">與頭獎末 4 碼相同</span></div>
                        <div class="number-row"><span class="prize-tag other-tag">六獎</span><span class="num-val text-sm">與頭獎末 3 碼相同</span></div>
                        <div class="number-row"><span class="prize-tag other-tag">增開六獎</span><span class="num-val" id="info-additional">無</span></div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Toast Container -->
        <div id="toast-container" class="toast-container"></div>
        
        <!-- 底部導覽列 -->
        <nav class="bottom-nav">
            <div class="nav-item active" data-target="view-scanner">
                <span class="icon">📷</span>
                <span class="label">相機對獎</span>
            </div>
            <div class="nav-item" data-target="view-keypad">
                <span class="icon">🔢</span>
                <span class="label">手動鍵盤</span>
            </div>
            <div class="nav-item" data-target="view-info">
                <span class="icon">📋</span>
                <span class="label">中獎號碼</span>
            </div>
        </nav>

        <!-- 結果彈出視窗 (Bottom Sheet) -->
        <div id="result-modal" class="result-modal hidden">
            <div class="result-content">
                <div class="result-header">
                    <span class="period-badge" id="result-period">114年11-12月</span>
                    <h2 id="result-invoice-number" class="modal-number">AB-12345678</h2>
                </div>
                <div class="prize-info" id="prize-info-card">
                    <div class="prize-status" id="prize-status">中獎啦！</div>
                    <div class="prize-name" id="prize-name">頭獎</div>
                    <div class="prize-amount" id="prize-amount">NT$ 200,000</div>
                </div>
                <button id="reset-btn" class="btn outline-btn btn-large">繼續對獎 (或按 Enter)</button>
            </div>
        </div>
    </div>
    
    <script src="mobile.js"></script>
</body>
</html>
